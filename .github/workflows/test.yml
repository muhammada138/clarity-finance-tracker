name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd backend
        # Explicit install required mock/test dependencies. They should already be in requirements but just in case
        pip install -r requirements.txt
    - name: Run Tests
      # need to define PYTHONPATH so app is importable
      run: |
        cd backend
        export PYTHONPATH=.
        pytest
